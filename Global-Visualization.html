<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Visualization Engine</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050b14; font-family: monospace; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        /* Safe UI Overlay */
        .dashboard {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(10, 15, 30, 0.9); border: 1px solid #1e293b;
            padding: 20px; color: #fff; border-radius: 8px; max-w: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); pointer-events: auto;
        }
        .title { color: #22d3ee; font-size: 16px; font-weight: bold; margin-bottom: 4px; }
        .meta { color: #64748b; font-size: 11px; margin-bottom: 15px; }
        .metric { display: flex; justify-content: space-between; font-size: 12px; margin-top: 6px; color: #94a3b8; }
        .status { color: #34d399; font-weight: bold; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="title">Global Hydro-Wind Engine</div>
        <div class="meta">Procedural Vector Matrix v2.0</div>
        <div class="metric"><span>Vector Paths:</span><span>1,500 Active</span></div>
        <div class="metric"><span>Path History:</span><span>40h Extended</span></div>
        <div class="metric"><span>Core Status:</span><span class="status">Running</span></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 3D ENVIRONMENT SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 50, 120);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- PROCEDURAL EARTH MATRIX ---
        const globeRadius = 60;
        const earthGeo = new THREE.SphereGeometry(globeRadius, 48, 48);
        const earthMat = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec2 vUv;
                varying vec3 vNormal;
                void main() {
                    vUv = uv;
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec2 vUv;
                varying vec3 vNormal;
                void main() {
                    float lat = abs(sin(vUv.y * 31.4159));
                    float lon = abs(sin(vUv.x * 62.8318));
                    float grid = smoothstep(0.96, 1.0, lat) + smoothstep(0.96, 1.0, lon);
                    
                    vec3 spaceBg = vec3(0.01, 0.02, 0.06);
                    vec3 neonWires = vec3(0.07, 0.18, 0.32);
                    vec3 finalSurface = mix(spaceBg, neonWires, clamp(grid, 0.0, 1.0));
                    
                    float glow = pow(1.0 - max(dot(vNormal, vec3(0.0, 0.0, 1.0)), 0.0), 2.5);
                    finalSurface += vec3(0.0, 0.35, 0.7) * glow * 0.4;
                    
                    gl_FragColor = vec4(finalSurface, 1.0);
                }
            `
        });
        const earthMesh = new THREE.Mesh(earthGeo, earthMat);
        scene.add(earthMesh);

        // --- MATH MODELLING VECTOR SPEEDS ---
        const totalStreams = 1500;
        const segmentsPerStream = 40;
        const totalPointsCount = totalStreams * segmentsPerStream;

        const linePositions = new Float32Array(totalPointsCount * 3);
        const lineColors = new Float32Array(totalPointsCount * 3);
        const streamHistoryData = [];

        // Generates fluid synthetic tracking arrays locally
        for (let s = 0; s < totalStreams; s++) {
            const phi = Math.acos(Math.random() * 2 - 1);
            const theta = Math.random() * Math.PI * 2;
            
            streamHistoryData[s] = {
                phi: phi,
                theta: theta,
                age: Math.floor(Math.random() * 80),
                maxAge: 100 + Math.floor(Math.random() * 80),
                history: []
            };

            const rad = globeRadius + 1.0;
            const x = rad * Math.sin(phi) * Math.cos(theta);
            const y = rad * Math.cos(phi);
            const z = rad * Math.sin(phi) * Math.sin(theta);

            for (let h = 0; h < segmentsPerStream; h++) {
                streamHistoryData[s].history.push({ x: x, y: y, z: z, speed: 15.0 });
            }
        }

        const lineGeo = new THREE.BufferGeometry();
        lineGeo.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        lineGeo.setAttribute('color', new THREE.BufferAttribute(lineColors, 3));

        const lineMat = new THREE.ShaderMaterial({
            vertexShader: `
                attribute vec3 color;
                varying vec3 vColor;
                void main() {
                    vColor = color;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() { gl_FragColor = vec4(vColor, 0.9); }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const windRibbonSystem = new THREE.LineSegments(lineGeo, lineMat);
        scene.add(windRibbonSystem);

        // --- ANIMATE RUNTIME CALCULATIONS LOOP ---
        function renderLoop() {
            requestAnimationFrame(renderLoop);

            earthMesh.rotation.y += 0.0003;
            windRibbonSystem.rotation.y += 0.0003;

            let bufferIdx = 0;

            for (let s = 0; s < totalStreams; s++) {
                let stream = streamHistoryData[s];
                stream.age += 1;

                // Analytical fluid simulation math vectors
                const u = Math.cos(stream.phi * 5.0) * 18.0 + 12.0;
                const v = Math.sin(stream.theta * 3.0) * 14.0;
                const speed = Math.sqrt(u*u + v*v);

                stream.phi -= v * 0.0004;
                stream.theta += u * 0.0004;

                if (stream.age >= stream.maxAge || stream.phi <= 0.02 || stream.phi >= Math.PI - 0.02) {
                    stream.phi = Math.acos(Math.random() * 2 - 1);
                    stream.theta = Math.random() * Math.PI * 2;
                    stream.age = 0;
                }

                const rad = globeRadius + 1.0;
                const nextX = rad * Math.sin(stream.phi) * Math.cos(stream.theta);
                const nextY = rad * Math.cos(stream.phi);
                const nextZ = rad * Math.sin(stream.phi) * Math.sin(stream.theta);

                stream.history.push({ x: nextX, y: nextY, z: nextZ, speed: speed });
                if (stream.history.length > segmentsPerStream) {
                    stream.history.shift();
                }

                for (let h = 0; h < segmentsPerStream - 1; h++) {
                    const pStart = stream.history[h];
                    const pEnd = stream.history[h + 1];

                    linePositions[bufferIdx]     = pStart.x;
                    linePositions[bufferIdx + 1] = pStart.y;
                    linePositions[bufferIdx + 2] = pStart.z;
                    linePositions[bufferIdx + 3] = pEnd.x;
                    linePositions[bufferIdx + 4] = pEnd.y;
                    linePositions[bufferIdx + 5] = pEnd.z;

                    const fade = h / (segmentsPerStream - 1);
                    
                    // Direct Velocity Component Color Mapping
                    if (pStart.speed < 22.0) {
                        lineColors[bufferIdx]     = 0.0; lineColors[bufferIdx + 1] = 0.6 * fade; lineColors[bufferIdx + 2] = 1.0 * fade;
                    } else {
                        lineColors[bufferIdx]     = 1.0 * fade; lineColors[bufferIdx + 1] = 0.4 * fade; lineColors[bufferIdx + 2] = 0.0;
                    }
                    
                    lineColors[bufferIdx + 3] = lineColors[bufferIdx];
                    lineColors[bufferIdx + 4] = lineColors[bufferIdx + 1];
                    lineColors[bufferIdx + 5] = lineColors[bufferIdx + 2];

                    bufferIdx += 6;
                }
            }

            windRibbonSystem.geometry.attributes.position.needsUpdate = true;
            windRibbonSystem.geometry.attributes.color.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }

        renderLoop();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
